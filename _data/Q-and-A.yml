- key: burn-os-tf-change-size
  question: 用了32G的TF卡，刷好树莓派系统之后，为什么只剩下50M空间了？
  answer: |
    感谢你们的喜爱, 我把我的配色方案放在网上了,
    你可以<a href='/static/files/Morvan Pycharm color scheme.icls'>点击这里</a>下载.
    在 Pycharm 中, 找到 Python 的配色方案 (Editor > Color Scheme > Python), 点击上部的小齿轮, 选 import scheme, 然后选择你刚刚下载的那个文件就行啦.
  
